    <meta charset="UTF-8">

    <title>Forge Prime | Pré-Qualificação</title>
    <meta name="description" content="Pré-qualificação para novos clientes Forge Prime - Gestão de Tráfego e Design">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --ouro-forjado: #C9A961;
            --ouro-claro: #f4e5c2;
            --chama-viva: #FF4500;
            --brasa-profunda: #D4662C;
            --brasa-clara: #ff8c42;
            --carvao-ardente: #0A0A0A;
            --metal-escuro: #1a1a1a;
            --cinza-texto: #e0e0e0;
            --cinza-medio: #888;
            --erro: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--brasa-profunda) var(--carvao-ardente); }
        body { font-family: 'Montserrat', sans-serif; background: var(--carvao-ardente); color: var(--cinza-texto); min-height: 100vh; display: flex; flex-direction: column; }

        .header {
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 2px solid var(--ouro-forjado);
            padding: 20px 0;
            text-align: center;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--chama-viva), transparent);
        }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .logo-icon { width: 40px; height: 48px; }
        .logo-text {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--ouro-forjado), var(--brasa-clara));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        .header-subtitle { color: var(--cinza-medio); font-size: 0.85rem; margin-top: 8px; letter-spacing: 1px; }

        .chat-container {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--brasa-profunda) rgba(255,255,255,0.03);
        }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.03); border-radius: 3px; margin: 4px 0; }
        .chat-container::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--brasa-profunda), var(--ouro-forjado)); border-radius: 3px; }
        .chat-container::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, var(--chama-viva), var(--brasa-clara)); }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s forwards;
            flex-shrink: 0;
        }
        .message.bot { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.error { align-self: flex-start; padding-left: 48px; }
        .message.error .message-bubble {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.4);
            color: #ff8888;
            font-size: 0.85rem;
            padding: 10px 16px;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1rem;
        }
        .message.bot .message-avatar { background: linear-gradient(135deg, var(--brasa-profunda), var(--chama-viva)); color: white; }
        .message.user .message-avatar { background: linear-gradient(135deg, var(--ouro-forjado), var(--brasa-clara)); color: var(--carvao-ardente); }

        .message-bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
        }
        .message.bot .message-bubble {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(201, 169, 97, 0.3);
            color: var(--cinza-texto);
            border-bottom-left-radius: 4px;
        }
        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--ouro-forjado), var(--brasa-profunda));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .options-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            padding-left: 48px;
            flex-shrink: 0;
            animation: fadeInUp 0.3s forwards;
        }
        .option-btn {
            background: linear-gradient(135deg, var(--brasa-profunda), var(--chama-viva));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 102, 44, 0.3);
        }
        .option-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 102, 44, 0.5); }

        .input-container {
            display: none;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding-left: 48px;
            animation: fadeInUp 0.3s forwards;
            flex-shrink: 0;
        }
        .input-field {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 169, 97, 0.3);
            border-radius: 25px;
            padding: 12px 20px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-field:focus { border-color: var(--ouro-forjado); box-shadow: 0 0 10px rgba(201, 169, 97, 0.2); }
        .input-field::placeholder { color: var(--cinza-medio); }
        .input-field.erro { border-color: var(--erro); box-shadow: 0 0 10px rgba(255, 68, 68, 0.2); }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--ouro-forjado), var(--brasa-clara));
            border: none;
            color: var(--carvao-ardente);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(201, 169, 97, 0.4); }

        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--chama-viva), var(--ouro-forjado));
            width: 0%;
            transition: width 0.5s ease;
        }

        .typing-indicator { display: flex; gap: 4px; padding: 10px 15px; }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--ouro-forjado);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        .final-screen {
            display: none;
            text-align: center;
            padding: 60px 20px;
            animation: fadeInUp 0.8s forwards;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .final-icon { font-size: 4rem; margin-bottom: 20px; }
        .final-title { font-family: 'Cinzel', serif; font-size: 2rem; color: var(--ouro-forjado); margin-bottom: 15px; }
        .final-text { color: var(--cinza-medio); margin-bottom: 30px; line-height: 1.7; max-width: 600px; }
        .whatsapp-final-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }
        .whatsapp-final-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(37, 211, 102, 0.5); }
        .whatsapp-final-btn i { font-size: 1.5rem; }

        .footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid rgba(201, 169, 97, 0.1);
            color: var(--cinza-medio);
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .footer-brand { font-family: 'Cinzel', serif; color: var(--ouro-forjado); margin-bottom: 5px; }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }

        @media (max-width: 768px) {
            .chat-container { padding: 20px 15px; max-height: calc(100vh - 180px); }
            .message-bubble { max-width: 85%; padding: 12px 16px; font-size: 0.9rem; }
            .options-container, .input-container { padding-left: 0; }
            .option-btn { padding: 10px 18px; font-size: 0.85rem; }
            .final-title { font-size: 1.5rem; }
        }
    </style>

<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K3TKJ8NL" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

        <div class="progress-bar" id="progressBar"></div>

                        <stop offset="0%" style="stop-color:#8b2500"/>

        <div class="final-icon">🔥</div>
        <h2 class="final-title">Pré-Qualificação Concluída!</h2>
        <p class="final-text">
            Obrigado, <strong id="finalNome"></strong>! Seu perfil foi enviado.<br>
            Clique abaixo para falar diretamente com nosso time no WhatsApp.
        </p>
        <a href="#" target="_blank" class="whatsapp-final-btn" id="whatsappFinalBtn">

    <script>
const chatContainer = document.getElementById('chatContainer');
const progressBar = document.getElementById('progressBar');
const finalScreen = document.getElementById('finalScreen');
const finalNome = document.getElementById('finalNome');
const whatsappFinalBtn = document.getElementById('whatsappFinalBtn');

let leadData = { nome: '', empresa: '', whatsapp: '', email: '', faturamento: '', investimento: '' };
let currentStep = 0;
const totalSteps = 6;
let messageIndex = 0;

function validarWhatsApp(numero) {
    const limpo = numero.replace(/\D/g, '');
    if (limpo.length < 10) return { valido: false, msg: 'Número incompleto. Digite DDD + número completo (mínimo 10 dígitos).' };
    if (limpo.length > 11) return { valido: false, msg: 'Número muito longo. Verifique se não digitou algo a mais.' };
    return { valido: true, formatado: limpo };
}

function validarEmail(email) {
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email.includes('@')) return { valido: false, msg: 'E-mail precisa conter @.' };
    if (!regex.test(email)) return { valido: false, msg: 'E-mail inválido. Use o formato: nome@dominio.com' };
    return { valido: true };
}

const chatFlow = [
    {
        type: 'bot',
        text: 'Fala! Sou da Forge Prime. Vou ser direto: pra saber se consigo te ajudar a escalar, preciso de 4 dados. Leva menos de 1 minuto. Bora?',
        delay: 500
    },
    {
        type: 'bot',
        text: 'Qual seu nome?',
        input: 'nome',
        placeholder: 'Digite seu nome',
        validar: (val) => {
            if (val.trim().length < 2) return { valido: false, msg: 'Nome muito curto. Digite seu nome completo.' };
            return { valido: true };
        }
    },
    {
        type: 'bot',
        text: 'Qual o nome da sua empresa?',
        input: 'empresa',
        placeholder: 'Nome da empresa',
        validar: (val) => {
            if (val.trim().length < 2) return { valido: false, msg: 'Nome da empresa muito curto.' };
            return { valido: true };
        }
    },
    {
        type: 'bot',
        text: 'Faturamento mensal médio?',
        options: [
            { value: '10k-15K', label: 'R$ 10K – R$ 15K' },
            { value: '15k-30k', label: 'R$ 15K – R$ 30K' },
            { value: '30k-100k', label: 'R$ 30K – R$ 100K' },
            { value: '100k+', label: 'Acima de R$ 100K' }
        ],
        field: 'faturamento'
    },
    {
        type: 'bot',
        text: 'Quanto você investe (ou pode investir) em tráfego pago por mês?',
        options: [
            { value: '1k-3K', label: 'R$ 1K - 3K' },
            { value: '3k-5K', label: 'R$ 3K - 5K' },
            { value: '5k-10k', label: 'R$ 5K – R$ 10K' },
            { value: '10k-30k', label: 'R$ 10K – R$ 30K' },
            { value: '30k+', label: 'Acima de R$ 30K' }
        ],
        field: 'investimento'
    },
    {
        type: 'bot',
        text: 'WhatsApp com DDD. Só isso, sem pontos ou traços:',
        input: 'whatsapp',
        placeholder: '11999999999',
        validar: (val) => validarWhatsApp(val)
    },
    {
        type: 'bot',
        text: 'E-mail pra contato:',
        input: 'email',
        placeholder: 'seu@email.com',
        validar: (val) => validarEmail(val)
    },
    {
        type: 'bot',
        text: 'Perfeito. Analisando seu perfil...',
        delay: 1200
    }
];

function scrollToBottom() {
    requestAnimationFrame(() => {
        setTimeout(() => { chatContainer.scrollTop = chatContainer.scrollHeight; }, 50);
    });
}

function updateProgress() {
    const progress = ((currentStep) / totalSteps) * 100;
    progressBar.style.width = progress + '%';
}

function replaceVariables(text) {
    return text.replace('{nome}', leadData.nome || '');
}

function addMessage(type, text, isError = false) {
    return new Promise(resolve => {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        if (isError) messageDiv.classList.add('error');

        if (!isError) {
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = type === 'bot' ? '<i class="fas fa-fire"></i>' : '<i class="fas fa-user"></i>';
            messageDiv.appendChild(avatar);
        }

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = replaceVariables(text);

        messageDiv.appendChild(bubble);
        chatContainer.appendChild(messageDiv);
        scrollToBottom();
        resolve();
    });
}

function addTyping(delay = 700) {
    return new Promise(resolve => {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.id = 'typingIndicator';

        const avatar = document.createElement('div');
        avatar.className = 'message-avatar';
        avatar.innerHTML = '<i class="fas fa-fire"></i>';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;

        typingDiv.appendChild(avatar);
        typingDiv.appendChild(bubble);
        chatContainer.appendChild(typingDiv);
        scrollToBottom();

        setTimeout(() => { typingDiv.remove(); resolve(); }, delay);
    });
}

function addInput(field, placeholder, validador) {
    const old = document.querySelector('.input-container');
    if (old) old.remove();

    const container = document.createElement('div');
    container.className = 'input-container';
    container.style.display = 'flex';

    const input = document.createElement('input');
    input.className = 'input-field';
    input.placeholder = placeholder;
    input.id = 'input';
    
    if (field === 'whatsapp') { input.inputMode = 'numeric'; input.type = 'tel'; }
    else if (field === 'email') { input.type = 'email'; }
    else { input.type = 'text'; }

    const btn = document.createElement('button');
    btn.className = 'send-btn';
    btn.innerHTML = '→';

    const processar = () => {
        const value = input.value.trim();
        if (!value) return;

        if (validador) {
            const resultado = validador(value);
            if (!resultado.valido) {
                input.classList.add('erro');
                input.value = '';
                input.placeholder = resultado.msg;
                addMessage('bot', resultado.msg, true);
                scrollToBottom();
                return;
            }
        }

        input.classList.remove('erro');
        container.remove();
        document.querySelectorAll('.message.error').forEach(el => el.remove());

        addMessage('user', value).then(() => {
            leadData[field] = value;
            currentStep++;
            updateProgress();
            setTimeout(processNextMessage, 300);
        });
    };

    btn.onclick = processar;
    input.addEventListener('keypress', e => { if (e.key === 'Enter') processar(); });

    container.appendChild(input);
    container.appendChild(btn);
    chatContainer.appendChild(container);
    scrollToBottom();
    
    setTimeout(() => { input.focus(); setTimeout(scrollToBottom, 300); }, 100);
}

function addOptions(options, field) {
    const container = document.createElement('div');
    container.className = 'options-container';

    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.label;

        btn.onclick = () => {
            container.remove();
            addMessage('user', opt.label).then(() => {
                leadData[field] = opt.value;
                currentStep++;
                updateProgress();
                setTimeout(processNextMessage, 300);
            });
        };
        container.appendChild(btn);
    });

    chatContainer.appendChild(container);
    scrollToBottom();
}

async function processNextMessage() {
    if (messageIndex >= chatFlow.length) {
        finish();
        return;
    }

    const msg = chatFlow[messageIndex];
    messageIndex++;

    if (msg.type === 'bot') {
        await addTyping(msg.delay || 600);
        await addMessage('bot', msg.text);

        if (msg.input) {
            addInput(msg.input, msg.placeholder, msg.validar);
            return;
        }

        if (msg.options) {
            addOptions(msg.options, msg.field);
            return;
        }

        if (messageIndex >= chatFlow.length) {
            setTimeout(finish, 800);
        } else {
            setTimeout(processNextMessage, 200);
        }
    }
}

// ===================================
// ENVIO CORRIGIDO - FORMDATA EM VEZ DE JSON
// ===================================

function finish() {
    progressBar.style.width = '100%';

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
        event: 'lead_submit_attempt',
        lead_nome: leadData.nome,
        lead_empresa: leadData.empresa
    });

    sendLeadAjax()
    .then(() => {
        window.dataLayer.push({
            event: 'generate_lead',
            currency: 'BRL',
            value: 1,
            lead_nome: leadData.nome,
            lead_empresa: leadData.empresa,
            lead_whatsapp: leadData.whatsapp,
            lead_email: leadData.email,
            lead_faturamento: leadData.faturamento,
            lead_investimento: leadData.investimento,
            lead_id: Date.now()
        });
        showFinalScreen();
    })
    .catch(err => {
        console.error('Erro ao enviar:', err);
        // Mesmo com erro no e-mail, mostra o WhatsApp (não perde o lead)
        showFinalScreen();
    });
}

function sendLeadAjax() {
    // FormSubmit.co funciona melhor com FormData do que JSON
    const formData = new FormData();
    
    // Dados do lead
    formData.append('Nome', leadData.nome);
    formData.append('Empresa', leadData.empresa);
    formData.append('WhatsApp', leadData.whatsapp);
    formData.append('Email', leadData.email);
    formData.append('Faturamento', leadData.faturamento);
    formData.append('Investimento', leadData.investimento);
    formData.append('Data_Hora', new Date().toLocaleString('pt-BR'));
    formData.append('Origem', 'Site Forge Prime - Pré-Qualificação');
    
    // Configurações obrigatórias do FormSubmit.co
    formData.append('_captcha', 'false');           // Desativa captcha pra não bloquear
    formData.append('_template', 'table');          // Formatação em tabela no e-mail
    formData.append('_subject', `Novo Lead: ${leadData.nome} - ${leadData.empresa}`);
    formData.append('_replyto', leadData.email);    // Permite responder direto pro lead

    return fetch('https://formsubmit.co/ajax/growthforje@gmail.com', {
        method: 'POST',
        body: formData,
        headers: {
            'Accept': 'application/json'
        }
        // IMPORTANTE: NÃO colocar 'Content-Type'. O browser seta automaticamente com o boundary correto para FormData
    }).then(res => {
        if (!res.ok) throw new Error('Erro no envio: ' + res.status);
        return res.json();
    });
}

function showFinalScreen() {
    chatContainer.style.display = 'none';
    finalScreen.style.display = 'flex';
    finalNome.textContent = leadData.nome || '';
    
    const texto = `Olá! Sou ${leadData.nome} da ${leadData.empresa}. Acabei de fazer a pré-qualificação no site e quero saber mais sobre a Forge Prime.`;
    const encoded = encodeURIComponent(texto);
    whatsappFinalBtn.href = `https://wa.me/5522988231811?text=${encoded}`;
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

updateProgress();
setTimeout(processNextMessage, 400);
    </script>
